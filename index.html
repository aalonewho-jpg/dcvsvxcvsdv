<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Test Faceit Leo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="particles-container"></div>
    
    <div class="app-container">
        <!-- Верхняя панель с лого и балансом -->
        <div class="top-bar">
            <div class="logo-area" id="logoBtn">
                <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/40'">
                <span class="logo-text">Test Faceit Leo</span>
            </div>
            <div class="coins-panel" id="coinsPanel">
                <img src="coin.jpg" alt="Coins" class="coin-icon" onerror="this.src='https://via.placeholder.com/24'">
                <span id="balanceAmount">0</span>
                <button class="add-coins-btn" id="addCoinsBtn"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <!-- Основной контент -->
        <div id="main-content" class="content"></div>

        <!-- Нижнее меню -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </div>
            <div class="nav-item" data-page="inventory">
                <i class="fas fa-box"></i>
                <span>Инвентарь</span>
            </div>
            <div class="nav-item" data-page="cases">
                <i class="fas fa-gift"></i>
                <span>Кейсы</span>
            </div>
            <div class="nav-item" data-page="faceit">
                <i class="fas fa-gamepad"></i>
                <span>Фейсит</span>
            </div>
            <div class="nav-item" data-page="profile">
                <i class="fas fa-user"></i>
                <span>Профиль</span>
            </div>
        </nav>
    </div>

    <script src="https://telegram-web-apps.org/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
